                                    <div key={index} className="relative pl-8">
                                        <div className="absolute left-[-5px] top-1.5 w-2.5 h-2.5 rounded-full bg-accent ring-4 ring-bg"></div>
                                        <div className="flex flex-col md:flex-row md:justify-between md:items-baseline mb-3">
                                            <h4 className="text-xl font-bold text-text1">{exp.role}</h4>
                                            <span className="text-accent font-mono text-sm mt-1 md:mt-0">{exp.duration}</span>
                                        </div>
                                        <h5 className="text-text2 font-medium mb-4">{exp.company}</h5>
                                        <p className="text-text2 leading-relaxed bg-surface/50 p-4 rounded border border-border">
                                            {exp.desc}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* CONTACT SECTION */}
                        <section id="contact" className="mb-20 animate-slide-up text-center scroll-mt-24" style={{ animationDelay: '0.6s' }}>
                            <h3 className="text-accent font-mono text-sm uppercase tracking-widest mb-4">What's Next?</h3>
                            <h2 className="text-4xl md:text-5xl font-bold text-text1 mb-8">Get In Touch</h2>
                            <p className="text-text2 max-w-xl mx-auto mb-10 text-lg">
                                Currently open to new opportunities in backend development, AI engineering, and Pega architecture. 
                                Whether you have a question or just want to say hi, I'll try my best to get back to you!
                            </p>
                            <a href="mailto:nagarampalligovind@gmail.com" className="inline-flex items-center justify-center px-8 py-4 border border-accent text-accent font-mono rounded hover:bg-accent/10 transition-colors">
                                <IconMail /> <span className="ml-3">Say Hello</span>
                            </a>
                        </section>

                        <footer className="text-center pb-8 pt-10 border-t border-border mt-20 text-text2 font-mono text-sm">
                            <p>Designed & Built based on Resume Data</p>
                        </footer>
                    </div>

                    {/* PROJECT MODAL */}
                    {selectedProject && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-bg/90 backdrop-blur-sm" onClick={() => setSelectedProject(null)}></div>
                            <div className="relative glass-panel w-full max-w-3xl max-h-[90vh] overflow-y-auto rounded-xl p-8 border border-border shadow-2xl animate-fade-in">
                                <button 
                                    className="absolute top-6 right-6 text-text2 hover:text-accent transition-colors"
                                    onClick={() => setSelectedProject(null)}
                                >
                                    <IconClose />
                                </button>
                                
                                <h3 className="text-3xl font-bold text-text1 mb-2 pr-10">{selectedProject.title}</h3>
                                
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-8 pb-6 border-b border-border gap-4">
                                    <p className="text-accent font-mono">{selectedProject.tech}</p>
                                    <a 
                                        href={selectedProject.github} 
                                        target={selectedProject.github !== "#" ? "_blank" : "_self"}
                                        rel="noreferrer"
                                        className="inline-flex items-center gap-2 px-4 py-2 border border-border rounded bg-surface hover:border-accent hover:text-accent transition-colors text-sm font-mono text-text2 shrink-0"
                                    >
                                        <IconGithub /> View Repository
                                    </a>
                                </div>
                                
                                <div className="mb-8">
                                    <h4 className="text-lg font-semibold text-text1 mb-4 uppercase tracking-wider text-sm">The Objective</h4>
                                    <p className="text-text2 leading-relaxed bg-surface p-4 rounded border border-border">
                                        {selectedProject.problem}
                                    </p>
                                </div>

                                <div>
                                    <h4 className="text-lg font-semibold text-text1 mb-6 uppercase tracking-wider text-sm">Execution Workflow</h4>
                                    <div className="space-y-4">
                                        {selectedProject.workflow.map((step, index) => (
                                            <div key={index} className="flex items-start bg-surface/50 p-4 rounded border border-border/50">
                                                <span className="text-accent font-mono text-lg font-bold mr-6 w-8 text-right shrink-0">
                                                    {(index + 1).toString().padStart(2, '0')}.
                                                </span>
                                                <p className="text-text1 pt-0.5 leading-relaxed">{step}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
